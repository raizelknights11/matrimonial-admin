<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kathyayini Matrimony — Admin Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <h1>Kathyayini Matrimony</h1>
    <span>Admin Portal</span>
  </div>
  <div class="header-stats">
    <div class="stat-pill"><span class="dot bride"></span><span id="bride-count">—</span> Brides</div>
    <div class="stat-pill"><span class="dot groom"></span><span id="groom-count">—</span> Grooms</div>
    <div class="stat-pill" style="border-color: var(--gold-dim);">
      <span style="color:var(--gold)">⟳</span>
      <span id="last-updated" style="color:var(--text-dim)">Loading…</span>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Search by name, gothra, nakshatra, profession…">
  </div>
  <div class="filter-group">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Bride">Brides</button>
    <button class="filter-btn" data-filter="Groom">Grooms</button>
  </div>
  <select class="filter-btn" id="caste-filter">
    <option value="">All Sub-Castes</option>
  </select>
  <select class="filter-btn" id="location-filter">
    <option value="">All Locations</option>
  </select>
  <select class="filter-btn" id="sort-select">
    <option value="newest">Newest First</option>
    <option value="oldest">Oldest First</option>
    <option value="name">Name A–Z</option>
  </select>
</div>

<div class="results-bar">
  Showing <span class="count" id="results-count">—</span> profiles
</div>

<div class="grid-container" id="grid">
  <div class="loading-state" style="grid-column:1/-1">
    <div class="spinner"></div>
    <div>Loading profiles…</div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600" id="modal-name"></div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:4px" id="modal-id"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
